name: Bug report
description: Report a reproducible defect, crash, or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open...
        2. Choose...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include macOS version, OtoChef commit/version, model choice, translation provider, and FFmpeg build when relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste non-sensitive logs, screenshots, or worker events.
      render: text
